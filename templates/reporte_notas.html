<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        @page { size: A4 landscape; margin: 10mm; }
        body { font-family: 'Arial', sans-serif; font-size: 8pt; color: #000; }
        .header { text-align: center; border-bottom: 2px solid #000; margin-bottom: 10px; }
        .info-block { display: flex; border: 1px solid #000; padding: 5px; margin-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        th, td { border: 1px solid #000; padding: 3px; text-align: center; }
        .leyenda-container { border: 1px solid #000; padding: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Centro Educativo Mami Luisa, S.R.L</h1>
        <p>"Educando con amor para un mundo mejor"</p>
        <p>INFORME DE APRENDIZAJE</p>
    </div>
    
    <div class="info-block">
        <div><strong>Estudiante:</strong> {{ nombre }} {{ apellido }}</div>
    </div>

    <table>
        <thead>
            <tr>
                <th rowspan="2">ÁREAS CURRICULARES</th>
                <th colspan="4">COMPETENCIAS FUNDAMENTALES</th>
                <th colspan="3">CALIFICACIÓN FINAL</th>
            </tr>
            <tr>
                <th>P1</th><th>P2</th><th>P3</th><th>P4</th>
                <th>C1</th><th>C2</th><th>C3</th>
            </tr>
        </thead>
        <tbody>
            <tr><td>Lengua Española</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        </tbody>
    </table>
</body>
</html>
