<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Expediente</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 40px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        h2 { color: #0f172a; margin-bottom: 25px; text-align: center; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 12px; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: #3b82f6; outline: none; }
        button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 15px; }
        button:hover { background: #1d4ed8; }
        .back { text-align: center; display: block; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 14px; }
        .alert { padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        .success { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>
<div class="container">
    <h2>Registrar Nuevo</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert success">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="nombre" placeholder="Nombre del Estudiante" required>
        <input type="text" name="ano" placeholder="Año Escolar (ej. 2024-2025)" required>
        <input type="text" name="codigo" placeholder="Código de Archivo (ej. F-001)" required>
        <button type="submit">Guardar Expediente</button>
    </form>
    <a href="/menu_expedientes" class="back">← Volver al sub-menú</a>
</div>
</body>
</html>
