<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Usuario - SIGEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 350px; }
        h2 { color: #1e293b; margin-bottom: 20px; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #475569; font-weight: 600; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #7e22ce; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .info-ciclo { font-size: 0.8rem; color: #7e22ce; font-weight: bold; margin-top: 5px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h2><i class="fa-solid fa-user-plus"></i> Registrar Usuario</h2>
        <form action="/registrar_usuario" method="POST">
            <div class="input-group">
                <label>Nombre de Usuario</label>
                <input type="text" name="username" required>
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>
            <div class="input-group">
                <label>Rol</label>
                <select name="rol" required>
                    <option value="profesora">Profesora</option>
                    <option value="oficina">Oficina</option>
                </select>
            </div>
            <div class="input-group">
                <label>Grado / Sección</label>
                <select name="grado" id="grado" onchange="detectarCiclo()" required>
                    <option value="">Seleccione...</option>
                    <option value="1-A">1ro A</option>
                    <option value="1-B">1ro B</option>
                    <option value="2">2do</option>
                    <option value="3">3ro</option>
                    <option value="4">4to</option>
                    <option value="5">5to</option>
                    <option value="6">6to</option>
                </select>
                <input type="hidden" name="ciclo" id="ciclo_input">
                <span id="ciclo_display" class="info-ciclo"></span>
            </div>
            <button type="submit">Guardar Usuario</button>
        </form>
        <a href="/menu" style="display:block; text-align:center; margin-top:15px; color:#64748b;">Volver al Menú</a>
    </div>

    <script>
        function detectarCiclo() {
            const grado = document.getElementById('grado').value;
            const display = document.getElementById('ciclo_display');
            const input = document.getElementById('ciclo_input');
            
            if (['1-A', '1-B', '2', '3'].includes(grado)) {
                display.innerText = "Ciclo detectado: Primer Ciclo";
                input.value = "Primer Ciclo";
            } else if (['4', '5', '6'].includes(grado)) {
                display.innerText = "Ciclo detectado: Segundo Ciclo";
                input.value = "Segundo Ciclo";
            } else {
                display.innerText = "";
                input.value = "";
            }
        }
    </script>
</body>
</html>
