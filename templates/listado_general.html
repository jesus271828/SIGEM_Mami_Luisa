<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado General de Inscritos - SIGEM</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f4f7f6; }
        h2 { color: #333; }
        .btn-volver { display: inline-block; margin-bottom: 15px; padding: 10px 15px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4a90e2; color: white; }
        tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>
    <h2>Alumnos Inscritos</h2>
    <a href="/menu" class="btn-volver">⬅ Volver al Menú</a>
    
    <table>
        <thead>
            <tr>
                <th>Nombres</th>
                <th>Apellidos</th>
                <th>Grado</th>
                <th>Año Escolar</th>
                <th>Fecha Inscripción</th>
            </tr>
        </thead>
        <tbody>
            {% for alumno in alumnos %}
            <tr>
                <td>{{ alumno.nombres }}</td>
                <td>{{ alumno.apellidos }}</td>
                <td>{{ alumno.grado }}</td>
                <td>{{ alumno.ano_escolar }}</td>
                <td>{{ alumno.fecha_inscripcion }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
